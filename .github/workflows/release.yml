name: Publish

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set Version
        id: set-version
        run:
          echo "version=`egrep -o "version>(.*)</version" install.xml | egrep -o \"[0-9.]*\"`" >> $GITHUB_OUTPUT

      - name: Zip Repository
        id: zip
        run: zip TIDAL -r API *.pm HTML Settings install.xml strings.txt README.md custom-convert.conf custom-types.conf

      - name: Update repo.xml
        run: |
          VERSION=${{ steps.set-version.outputs.version }}
          SHA=$(sha1sum TIDAL.zip | awk '{print $1}')
          URL="https://github.com/${{ github.repository }}/releases/download/${VERSION}/TIDAL.zip"
          ICON="https://raw.githubusercontent.com/${{ github.repository }}/main/HTML/EN/plugins/TIDAL/html/tidal_MTL_svg_tidal.png"
          LINK="https://github.com/${{ github.repository }}"

          python3 - <<EOF
          import xml.etree.ElementTree as ET
          import os

          ET.register_namespace('', '')
          tree = ET.parse('repo/repo.xml')
          root = tree.getroot()
          plugin = root.find('.//plugin')

          plugin.set('version', '${VERSION}')
          plugin.find('url').text = '${URL}'
          plugin.find('sha').text = '${SHA}'
          plugin.find('link').text = '${LINK}'
          plugin.find('icon').text = '${ICON}'

          tree.write('repo/repo.xml', encoding='unicode', xml_declaration=True)
          print(f"Updated repo.xml: version=${VERSION} sha=${SHA}")
          EOF

      - name: Update Repository
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add repo/repo.xml
          git commit -m "Update repo.xml for release ${{ steps.set-version.outputs.version }}"
          git push origin HEAD:main

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.set-version.outputs.version }}
          name: Version ${{ steps.set-version.outputs.version }}
          body: TIDAL plugin release
          draft: false
          prerelease: false
          files: TIDAL.zip
